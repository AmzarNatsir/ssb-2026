version: '3'

volumes:
  local_mysql_data: {}
  local_mysql_data_backup: {}

services:
  php: &php
    build:
      context: .
      dockerfile: ./compose/local/laravel/Dockerfile
    image: ssb_local_php
    container_name: php-SSB
    restart: unless-stopped
    tty: true
    depends_on:
      - mysql
    environment:
      SERVICE_NAME: php
      SERVICE_TAGS: dev
    # env_file:
    #   - .env
    volumes:
      - ./:/var/www/html
      - ./vendor:/var/www/html/vendor
      - ./storage:/var/www/html/storage
    #command: /start
  
  mysql:
    build:
      context: .
      dockerfile: ./compose/local/mysql/Dockerfile
    image: ssb_local_mysql
    container_name: mysql-SSB
    tty: true
    env_file:
      - .env.local
    ports:
      - 3307:3306
    volumes:
      - local_mysql_data:/var/lib/mysql/
      - local_mysql_data_backup:/backups
  
  nginx:
    build:
      context: .
      dockerfile: ./compose/local/nginx/Dockerfile
    image: ssb_local_nginx
    container_name: nginx-SSB
    restart: unless-stopped
    tty: true
    depends_on:
      - php
    volumes:
      - ./:/var/www/html
      - ./storage/certs:/etc/nginx/certs
      - ./compose/local/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 80:80
      - 443:443